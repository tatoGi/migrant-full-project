services:

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        PHP_VERSION: ${DOCKER_PHP_VERSION:-8.2}
    container_name: ${APP_NAME:-laravel}_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - vendor_data:/var/www/html/vendor
      - node_modules_data:/var/www/html/node_modules
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-local}

  nginx:
    image: nginx:alpine
    container_name: ${APP_NAME:-laravel}_nginx
    restart: unless-stopped
    ports:
      - "${DOCKER_HTTP_PORT:-8080}:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  # ── MySQL ────────────────────────────────────────────────────
  # გამოიყენება როცა DOCKER_DB_ENGINE=mysql (default)
  # გამოთიშვა: profile-ი "mysql" მოაშალე, postgres-ის profile ჩართე
  db:
    image: ${DOCKER_DB_IMAGE:-mysql}:${DOCKER_DB_VERSION:-8.0}
    container_name: ${APP_NAME:-laravel}_db
    restart: unless-stopped
    ports:
      - "${DOCKER_DB_PORT:-3307}:${DOCKER_DB_INTERNAL_PORT:-3306}"
    environment:
      # MySQL env vars
      MYSQL_DATABASE: ${DB_DATABASE:-laravel}
      MYSQL_USER: ${DB_USERNAME:-laravel}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      # PostgreSQL env vars (იგნორირდება MySQL-ზე)
      POSTGRES_DB: ${DB_DATABASE:-laravel}
      POSTGRES_USER: ${DB_USERNAME:-laravel}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ${DOCKER_DB_HEALTHCHECK:-mysqladmin ping -h localhost}
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
  vendor_data:
  node_modules_data:
